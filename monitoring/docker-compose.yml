services:
  # Stackdriver exporter: pulls GCP Cloud Run metrics into Prometheus
  stackdriver-exporter:
    image: prometheuscommunity/stackdriver-exporter:latest
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/credentials/gcp-key.json
      - GOOGLE_PROJECT_ID=sahar-pfe
    volumes:
      - /home/sahar/gcp-key.json:/credentials/gcp-key.json:ro
    ports:
      - "9255:9255"
    command:
      - "--google.project-id=sahar-pfe"
      - "--monitoring.metrics-type-prefixes=run.googleapis.com"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    user: root
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped
    depends_on:
      - stackdriver-exporter

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
